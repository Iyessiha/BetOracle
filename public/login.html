<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#22c55e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Betoracle">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">
  <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <meta name="msapplication-TileColor" content="#060906">
  <meta name="msapplication-TileImage" content="/icons/icon-144.png">
<title>Connexion — Betoracle Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --gb:#22c55e;--gl:#4ade80;--gold:#F5C842;
  --bg:#060a06;--s1:#0e140e;--b1:#1a2a1a;--b2:#243424;
  --text:#e8f0e8;--muted:#6a8a6a;--red:#ef4444;
  --ff:'Barlow',sans-serif;--fd:'Bebas Neue',sans-serif;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--ff);
  min-height:100%;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(34,197,94,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(245,200,66,.04) 0%,transparent 55%);
}

/* PAGE WRAPPER */
.page{
  min-height:100vh;
  min-height:100dvh; /* dynamic viewport */
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  padding-top:max(24px, calc(var(--safe-t) + 24px));
  padding-bottom:max(24px, calc(var(--safe-b) + 24px));
}

/* CARD */
.card{
  width:100%;
  max-width:400px;
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gb),var(--gold));
}

/* CARD INNER */
.card-inner{ padding:36px 32px 32px; }

/* LOGO */
.logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:32px;
}
.logo-orb{
  width:42px;height:42px;border-radius:11px;
  background:rgba(34,197,94,.12);border:1.5px solid var(--gb);
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.logo-name{font-family:var(--fd);font-size:22px;letter-spacing:.05em}
.logo-name span{color:var(--gold)}

h1{
  font-family:var(--fd);font-size:30px;letter-spacing:.04em;
  text-align:center;margin-bottom:5px;
}
.sub{
  font-size:13px;color:var(--muted);text-align:center;
  margin-bottom:26px;line-height:1.5;
}

/* CHAMPS */
.field{margin-bottom:15px}
.field label{
  display:block;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin-bottom:6px;
}
.field input{
  width:100%;
  background:rgba(0,0,0,.2);
  border:1.5px solid var(--b2);
  border-radius:10px;
  padding:13px 15px;
  font-size:15px;color:var(--text);
  font-family:var(--ff);outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.field input:focus{border-color:var(--gb)}
.field input::placeholder{color:var(--muted)}
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:48px}
.pwd-eye{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:18px;padding:4px;
}

/* ERREUR */
.err{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
  color:#fca5a5;border-radius:10px;
  padding:11px 15px;font-size:13px;
  display:none;align-items:center;gap:8px;
  margin-bottom:14px;line-height:1.4;
}

/* BOUTON */
.btn-login{
  width:100%;padding:14px;border-radius:11px;border:none;
  background:var(--gb);color:#000;
  font-size:15px;font-weight:800;font-family:var(--ff);
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:9px;
  -webkit-tap-highlight-color:transparent;
  margin-top:4px;
}
.btn-login:active{background:var(--gl);transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* LIENS */
.links{
  display:flex;flex-direction:column;gap:10px;
  text-align:center;margin-top:20px;
  font-size:13px;color:var(--muted);
}
.links a{color:var(--gb);font-weight:600;text-decoration:none}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:18px 0;color:var(--b2);
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.divider span{font-size:12px;color:var(--muted)}

/* LIEN RETOUR */
.back{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:20px;font-size:13px;color:var(--muted);
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.back:hover{color:var(--text)}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* MOBILE OVERRIDES */
@media(max-width:480px){
  .page{padding:16px;padding-top:max(20px,calc(var(--safe-t) + 20px));padding-bottom:max(16px,calc(var(--safe-b) + 16px));justify-content:flex-start;padding-top:max(40px,calc(var(--safe-t) + 40px))}
  .card{border-radius:16px}
  .card-inner{padding:28px 22px 24px}
  .logo{margin-bottom:24px}
  h1{font-size:26px}
  .sub{font-size:12px;margin-bottom:20px}
  .field input{padding:12px 14px;font-size:16px} /* 16px évite le zoom iOS */
  .btn-login{padding:15px;font-size:16px}
}

/* Fix logo overflow mobile */
.logo-badge, .m-orb, .logo-orb {
  flex-shrink: 0 !important;
  overflow: hidden !important;
}
.logo-badge img, .m-orb img, .logo-orb img {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
  display: block !important;
}

</style>
</head>
<body data-page="login">

<div class="page">
  <div class="card">
    <div class="card-inner">

      <div class="logo">
        <div class="logo-orb" style="background:none;border:none;padding:0"><img src="/icons/logo-mark.png" alt="Betoracle Pro" style="width:42px;height:42px;object-fit:cover;border-radius:8px"></div>
        <div class="logo-name">BET<span>ORACLE</span></div>
      </div>

      <h1>CONNEXION</h1>
      <p class="sub">Accède à tes analyses et ton coupon du jour</p>

      <div class="err" id="msg"><i class="ti ti-alert-circle"></i><span id="msg-txt"></span></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="ton@email.com"
               autocomplete="email" inputmode="email"
               oninput="clearMsg()" onkeydown="if(event.key==='Enter')doLogin()">
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <div class="pwd-wrap">
          <input type="password" id="pwd" placeholder="••••••••"
                 autocomplete="current-password"
                 oninput="clearMsg()" onkeydown="if(event.key==='Enter')doLogin()">
          <button type="button" class="pwd-eye" onclick="togglePwd()">
            <i class="ti ti-eye" id="eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btn" onclick="doLogin()">
        <i class="ti ti-login"></i> Se connecter
      </button>

      <div class="links">
        <a onclick="resetPwd()" style="cursor:pointer">Mot de passe oublié ?</a>
      </div>

      <div class="divider"><span>ou</span></div>

      <div class="links">
        <span>Pas de compte ? <a href="/signup">Créer mon compte gratuit →</a></span>
      </div>

    </div>
  </div>

  <a href="/" class="back">
    <i class="ti ti-arrow-left"></i> Retour à l'accueil
  </a>
</div>

<script>
const SUPA_URL  = 'https://ovulcqsrzkwlnhnyllij.supabase.co'
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dWxjcXNyemt3bG5obnlsbGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDc1NzgsImV4cCI6MjA5NjkyMzU3OH0.eJvZE2tgYB42CHYyosZGp8YiMZw4YJRJbdR3d_mmvLw'

// Vérifier session existante
;(async()=>{
  const t=localStorage.getItem('sb_access_token')
  if(!t)return
  try{
    const r=await fetch(`${SUPA_URL}/auth/v1/user`,{headers:{'apikey':SUPA_ANON,'Authorization':`Bearer ${t}`}})
    const d=await r.json()
    // Redirection selon rôle
    if(d.is_admin) {
      window.location.replace('/admin')
    } else {
      const next = new URLSearchParams(location.search).get('next') || '/dashboard'
      window.location.replace(next)
    }
  }catch{}
})()

function clearMsg(){document.getElementById('msg').style.display='none'}

function showMsg(txt,ok=false){
  const el=document.getElementById('msg')
  document.getElementById('msg-txt').textContent=txt
  el.style.cssText=ok
    ?'display:flex;background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:var(--gb)'
    :'display:flex;background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#fca5a5'
}

function togglePwd(){
  const i=document.getElementById('pwd'),e=document.getElementById('eye')
  i.type=i.type==='password'?'text':'password'
  e.className=i.type==='password'?'ti ti-eye':'ti ti-eye-off'
}

function setBtn(loading){
  const b=document.getElementById('btn')
  b.disabled=loading
  b.innerHTML=loading
    ?'<i class="ti ti-loader-2 spin"></i> Connexion…'
    :'<i class="ti ti-login"></i> Se connecter'
}

async function doLogin(){
  clearMsg()
  const email=document.getElementById('email').value.trim()
  const pwd=document.getElementById('pwd').value
  if(!email)return showMsg('Entre ton adresse email.')
  if(!pwd)return showMsg('Entre ton mot de passe.')
  setBtn(true)
  try{
    // Utiliser l'Edge Function sécurisée (rate limit + track event + refresh token)
    const EDGE='https://ovulcqsrzkwlnhnyllij.supabase.co/functions/v1/auth-secure'
    const r=await fetch(EDGE+'?action=login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email.toLowerCase(),password:pwd})
    })
    const d=await r.json()
    if(!d.success||!d.access_token){
      setBtn(false)
      return showMsg(d.error||'Email ou mot de passe incorrect.')
    }
    // Stocker token + refresh token
    localStorage.setItem('sb_access_token', d.access_token)
    localStorage.setItem('sb_refresh_token', d.refresh_token||'')
    localStorage.setItem('sb_user_id', d.user_id||'')
    localStorage.setItem('bp_plan', d.effective_plan||'pro')
    sessionStorage.setItem('bp_token',  d.access_token)
    sessionStorage.setItem('bp_prenom', d.first_name||email.split('@')[0])
    sessionStorage.setItem('bp_plan',   d.effective_plan||'pro')
    showMsg(`Bienvenue ${d.first_name||email.split('@')[0]} ! 🏆`, true)
    setTimeout(()=>{
      // Admin → /admin, sinon dashboard
      const isAdmin = d.is_admin === true
      if (isAdmin) { window.location.replace('/admin'); return }
      const next = new URLSearchParams(location.search).get('next') || '/dashboard'
      window.location.replace(next)
    }, 600)
  }catch(e){setBtn(false);showMsg('Erreur réseau. Vérifie ta connexion.')}
}

async function resetPwd(){
  const email=document.getElementById('email').value.trim()
  if(!email)return showMsg('Entre ton email d\'abord.')
  try{
    await fetch(`${SUPA_URL}/auth/v1/recover`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_ANON},
      body:JSON.stringify({email})
    })
    showMsg('Email de réinitialisation envoyé !',true)
  }catch{showMsg('Erreur réseau.')}
}

window.addEventListener('load',()=>document.getElementById('email').focus())
</script>
<script src="./assets/js/nav.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(r => console.log('[SW] Enregistré:', r.scope))
          .catch(e => console.log('[SW] Erreur:', e))
      })
    }

    // Invite d'installation PWA (Android/Chrome)
    let deferredPrompt
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault()
      deferredPrompt = e
      // Afficher le bouton d'install si présent dans la page
      const btn = document.getElementById('pwa-install-btn')
      if (btn) {
        btn.style.display = 'flex'
        btn.addEventListener('click', () => {
          deferredPrompt.prompt()
          deferredPrompt.userChoice.then(() => { deferredPrompt = null; btn.style.display = 'none' })
        })
      }
    })
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] Application installée')
      const btn = document.getElementById('pwa-install-btn')
      if (btn) btn.style.display = 'none'
    })
  </script>
</body>
</html>
