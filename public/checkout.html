<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betoracle Pro — Paiement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080c08;color:#e8f0e8;
  font-family:'Barlow',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.card{
  background:#111711;border:1px solid #2a3a2a;border-radius:20px;
  padding:40px 32px;max-width:420px;width:100%;text-align:center;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#22c55e,#F5C842);
}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:.06em;margin-bottom:32px;
  color:#e8f0e8;
}
.logo span{color:#F5C842}

/* Loading state */
.spinner{
  width:52px;height:52px;border-radius:50%;
  border:3px solid #2a3a2a;
  border-top-color:#22c55e;
  animation:spin .8s linear infinite;
  margin:0 auto 24px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;margin-bottom:8px}
.sub{font-size:14px;color:#7a9a7a;line-height:1.6;margin-bottom:24px}

.plan-box{
  background:#161e16;border:1px solid #2a3a2a;border-radius:12px;
  padding:16px 20px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;
}
.plan-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em}
.plan-price{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#F5C842}
.plan-period{font-size:12px;color:#7a9a7a;margin-top:2px}

/* Error state */
.error-box{
  display:none;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:10px;padding:14px 16px;font-size:14px;color:#ef4444;
  margin-bottom:20px;text-align:left;line-height:1.5;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px 24px;border-radius:10px;
  font-family:'Barlow',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;border:none;transition:all .2s;text-decoration:none;
}
.btn-green{background:#22c55e;color:#000}
.btn-green:hover{background:#4ade80;transform:translateY(-1px)}
.btn-outline{background:transparent;color:#7a9a7a;border:1px solid #2a3a2a;margin-top:10px}
.btn-outline:hover{border-color:#22c55e;color:#22c55e}

.secure{font-size:12px;color:#3a5a3a;margin-top:16px}

/* Hidden by default */
.state{display:none}
.state.active{display:block}
</style>
</head>
<body>

<div class="card">
  <div class="logo">BET<span>ORACLE</span> PRO</div>

  <!-- Plan info (toujours visible) -->
  <div class="plan-box">
    <div>
      <div class="plan-name" id="plan-label">PRO</div>
      <div class="plan-period" id="plan-period">1 semaine</div>
    </div>
    <div>
      <div class="plan-price" id="plan-price">1 500 FCFA</div>
    </div>
  </div>

  <!-- État : chargement -->
  <div class="state active" id="state-loading">
    <div class="spinner"></div>
    <div class="title">Préparation du paiement</div>
    <div class="sub">Connexion à GeniusPay en cours…</div>
  </div>

  <!-- État : erreur -->
  <div class="state" id="state-error">
    <div class="error-box" id="error-msg"></div>
    <button class="btn btn-green" onclick="initiate()">Réessayer</button>
    <a href="dashboard.html" class="btn btn-outline">Retour au dashboard</a>
  </div>

  <div class="secure">🔒 Paiement sécurisé · Accès immédiat · Résiliable à tout moment</div>
</div>

<script>
const SUPA_URL   = 'https://ovulcqsrzkwlnhnyllij.supabase.co'
const SUPA_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dWxjcXNyemt3bG5obnlsbGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDc1NzgsImV4cCI6MjA5NjkyMzU3OH0.eJvZE2tgYB42CHYyosZGp8YiMZw4YJRJbdR3d_mmvLw'
const PAY_URL    = `${SUPA_URL}/functions/v1/payments`

const PLANS = {
  starter:{ week:750,  month:2500,  label:'STARTER' },
  pro:    { week:1500, month:5000,  label:'PRO'     },
  elite:  { week:3000, month:10000, label:'ELITE'   },
}

const params   = new URLSearchParams(location.search)
const plan     = params.get('plan')   || 'pro'
const period   = params.get('period') || 'week'
const planData = PLANS[plan] || PLANS.pro
const price    = planData[period]

// Afficher les infos du plan
document.getElementById('plan-label').textContent  = planData.label
document.getElementById('plan-period').textContent = period === 'week' ? '1 semaine' : '1 mois'
document.getElementById('plan-price').textContent  = price.toLocaleString('fr-FR') + ' FCFA'

function setState(id) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg
  document.getElementById('error-msg').style.display = 'block'
  setState('state-error')
}

function getToken() {
  return localStorage.getItem('sb_access_token')
      || sessionStorage.getItem('sb_access_token')
      || null
}

async function refreshToken() {
  const rt = localStorage.getItem('sb_refresh_token') || sessionStorage.getItem('sb_refresh_token')
  if (!rt) return null
  try {
    const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_ANON},
      body:JSON.stringify({refresh_token:rt})
    })
    const d = await r.json()
    if (d.access_token) {
      localStorage.setItem('sb_access_token', d.access_token)
      if (d.refresh_token) localStorage.setItem('sb_refresh_token', d.refresh_token)
      return d.access_token
    }
  } catch {}
  return null
}

async function initiate() {
  setState('state-loading')

  let token = getToken()
  if (!token) {
    // Tenter refresh
    token = await refreshToken()
  }
  if (!token) {
    location.href = 'login.html?redirect=' + encodeURIComponent(location.href)
    return
  }

  try {
    const res = await fetch(PAY_URL + '?action=initiate', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer ' + token,
        'apikey': SUPA_ANON,
      },
      body: JSON.stringify({ plan, period })
    })

    const data = await res.json()

    if (res.status === 401) {
      // Token expiré → refresh et retry
      const newToken = await refreshToken()
      if (newToken) { return initiate() }
      location.href = 'login.html?redirect=' + encodeURIComponent(location.href)
      return
    }

    if (!res.ok || !data.success) {
      showError(data.error || 'Erreur lors de la création du paiement. Réessaie dans quelques secondes.')
      return
    }

    // Succès → redirection vers GeniusPay
    if (data.checkout_url) {
      window.location.href = data.checkout_url
    } else {
      showError('URL de paiement non reçue. Contacte le support.')
    }

  } catch (e) {
    showError('Erreur réseau. Vérifie ta connexion et réessaie.')
  }
}

// Lancer le paiement automatiquement dès l'ouverture de la page
initiate()
</script>
</body>
</html>
