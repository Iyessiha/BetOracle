<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Betoracl Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{--gb:#22c55e;--gold:#F5C842;--bg:#080c08;--s1:#111711;--b1:#1a261a;--text:#e8f0e8;--muted:#6b8a6b;--fd:'Bebas Neue',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.container{max-width:480px}
.icon{font-size:80px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-family:var(--fd);font-size:clamp(80px,15vw,120px);letter-spacing:.04em;color:var(--gb);line-height:.9;margin-bottom:8px}
.sub{font-family:var(--fd);font-size:clamp(20px,5vw,32px);letter-spacing:.06em;color:var(--text);margin-bottom:16px}
p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:32px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;transition:all .2s}
.btn-green{background:var(--gb);color:#000}
.btn-green:hover{background:#4ade80;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--b1)}
.btn-outline:hover{border-color:var(--gb);color:var(--gb)}
.pitch{position:fixed;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,.015) 60px),repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,.015) 60px);pointer-events:none;z-index:-1}
</style>
</head>
<body>
<div class="pitch"></div>
<div class="container">
  <div class="icon"><img src="/icons/icon-192.png" style="width:80px;height:80px;object-fit:cover;border-radius:20px;filter:drop-shadow(0 0 20px rgba(34,197,94,.4))" alt="Betoracl"></div>
  <h1>404</h1>
  <div class="sub">L'Oracle ne trouve pas</div>
  <p>Cette page n'existe pas ou a été déplacée.<br>Retourne au terrain pour continuer tes analyses.</p>
  <div class="links">
    <a href="/" class="btn btn-green"><i class="ti ti-home"></i> Accueil</a>
    <a href="/dashboard" class="btn btn-outline"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="/analyse" class="btn btn-outline"><i class="ti ti-brain"></i> Oracle IA</a>
  </div>
</div>
</body>
</html>
