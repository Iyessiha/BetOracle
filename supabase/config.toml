[project]
id = "TON_PROJECT_ID"
org_id = "TON_ORG_ID"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "https://betoracle.pro"
additional_redirect_urls = [
  "https://betoracle.pro/welcome.html",
  "http://localhost:3000/welcome.html"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[edge_runtime]
enabled = true
policy = "per_worker"

# ── CRON JOBS (pg_cron) ──
