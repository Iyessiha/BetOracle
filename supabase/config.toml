#
# -- Générer le coupon chaque matin à 07h00 UTC (= 08h00 WAT)
# SELECT cron.schedule(
#   'betoracle-daily-coupon',
#   '0 7 * * *',
#   $$
#     SELECT net.http_post(
#       url := current_setting('app.supabase_url') || '/functions/v1/coupons',
#       headers := jsonb_build_object(
#         'Content-Type', 'application/json',
#         'Authorization', 'Bearer ' || current_setting('app.service_role_key')
#       ),
#       body := '{"action":"auto"}'::jsonb
#     )
#   $$
# );
#
# -- Désactiver les abonnements expirés chaque heure
# SELECT cron.schedule(
#   'betoracle-expire-plans',
#   '0 * * * *',
#   $$
#     UPDATE public.profiles
#     SET plan = 'free'
#     WHERE plan != 'free'
#       AND plan_expires_at < now();
#   $$
# );

[functions.oracle]
verify_jwt = true

[functions.payments]
verify_jwt = true

[functions.coupons]
verify_jwt = false

[functions.telegram]
verify_jwt = false

[functions.webhook-payment]
verify_jwt = false
